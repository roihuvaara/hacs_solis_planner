plan_schedule:
  name: Plan schedule
  description: Plan Solis charge and hold slots from a Home Assistant state payload.
  fields:
    planner_state:
      name: Planner state
      description: Full planner input mapping, including horizon, usage profile, and current slots.
      required: true
      selector:
        object:

build_load_forecast:
  name: Build load forecast
  description: Build a weather-adjusted load forecast aligned to the planner horizon.
  fields:
    forecast_state:
      name: Forecast state
      description: Optional direct forecast payload with explicit samples for load and temperature history.
      required: false
      selector:
        object:
    planner_state:
      name: Planner state
      description: Planner horizon context used when deriving samples from Home Assistant entities.
      required: false
      selector:
        object:
    load_source_entity_id:
      name: Load source entity
      description: Power or energy sensor used to derive recent per-period consumption.
      required: false
      selector:
        entity:
          domain: sensor
    energy_entity_id:
      name: Energy entity
      description: Deprecated alias for load_source_entity_id kept for compatibility.
      required: false
      selector:
        entity:
          domain: sensor
    temperature_entity_id:
      name: Temperature entity
      description: Outdoor temperature sensor used for historical weather correction.
      required: false
      selector:
        entity:
          domain: sensor
    weather_entity_id:
      name: Weather entity
      description: Weather entity used for hourly temperature forecast lookups.
      required: false
      selector:
        entity:
          domain: weather
    baseline_days:
      name: Baseline days
      description: Number of complete trailing days used for the baseline window.
      required: false
      default: 30
      selector:
        number:
          min: 7
          max: 90
          mode: box
    recent_days:
      name: Recent days
      description: Number of complete trailing days used for the residual trend window.
      required: false
      default: 7
      selector:
        number:
          min: 1
          max: 30
          mode: box
    bucket_minutes:
      name: Bucket minutes
      description: Period size used for historical bucket alignment.
      required: false
      default: 15
      selector:
        number:
          min: 5
          max: 60
          mode: box

apply_schedule:
  name: Apply schedule
  description: Apply compiled charge and discharge slots directly to Solis slot entities and verify readback.
  fields:
    charge_slots:
      name: Charge slots
      description: Charge slot payload from the planner.
      required: true
      selector:
        object:
    discharge_slots:
      name: Discharge slots
      description: Discharge slot payload from the planner.
      required: true
      selector:
        object:
    debug_status:
      name: Debug status
      description: Planner status string to publish after a successful write attempt.
      required: false
      selector:
        text:
    debug_summary:
      name: Debug summary
      description: Planner summary string to publish after a successful write attempt.
      required: false
      selector:
        text:
    verify:
      name: Verify
      description: Re-read slot entities after the write and report mismatches.
      required: false
      default: true
      selector:
        boolean:
    write_strategy:
      name: Write strategy
      description: Internal writer mode. Defaults to direct entity writes.
      required: false
      default: direct_entities
      selector:
        text:
